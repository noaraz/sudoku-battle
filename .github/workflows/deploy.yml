# Deploy to Cloud Run on git tag push (v*.*.*)
# Requires GitHub Actions repository variables:
#   WIF_PROVIDER, WIF_SERVICE_ACCOUNT
#
# Spec: /Users/noa.raz/.claude/plans/let-s-plan-phase-validated-horizon.md
# Plan: docs/superpowers/plans/2026-04-22-phase5-deploy.md

name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    # Manual trigger — useful for re-deploying an existing tag (e.g. rollback).
    # IMPORTANT: You must select a tag ref (not a branch) in the GitHub UI when
    # running manually. Branch refs silently skip all jobs due to the
    # `if: startsWith(github.ref, 'refs/tags/')` guards on every job.

# One deploy at a time — don't cancel an in-progress deploy if a new tag arrives
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE: me-west1-docker.pkg.dev/sudoku-battle-494011/sudoku-battle/app
  REGION: me-west1
  SERVICE: sudoku-battle
  PROJECT: sudoku-battle-494011

jobs:
  # ── Re-run CI on the tag before deploying ──────────────────────────────────
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    # Guard: skip if somehow triggered on a non-tag ref (e.g. workflow_dispatch on a branch)
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Start Firestore emulator
        run: |
          npm install -g firebase-tools
          echo '{"emulators":{"firestore":{"port":8080,"host":"0.0.0.0"}}}' > firebase.json
          npx firebase emulators:start --only firestore --project sudoku-battle-local &
          timeout 30 bash -c 'until curl -sf http://localhost:8080; do sleep 1; done'
      - name: pytest
        run: pytest -q
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: vitest
        run: npx vitest run --reporter=dot

  # ── Build, push, deploy ────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Cloud Run
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Authenticate to Google Cloud (WIF — no keys)
        uses: google-github-actions/auth@7b53cdc2a387814ed14eec026287aac689ae8c9b  # v2.1.9
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker me-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.ref_name }} \
            .

      - name: Push image to Artifact Registry
        run: docker push ${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Deploy to Cloud Run
        run: |
          # ^|^ sets | as the env-var delimiter — needed because CORS_ORIGIN_REGEX
          # contains characters that confuse gcloud's default , parser.
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.ref_name }} \
            --region=${{ env.REGION }} \
            --service-account=sudoku-battle-runtime@${{ env.PROJECT }}.iam.gserviceaccount.com \
            --set-env-vars="^|^APP_ENV=production|GCP_PROJECT_ID=${{ env.PROJECT }}|CORS_ORIGIN_REGEX=https://sudoku-battle-[a-z0-9]+-zf\\.a\\.run\\.app" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --allow-unauthenticated \
            --port=8080 \
            --quiet

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "### ✅ Deployed ${{ github.ref_name }} to: $URL" >> $GITHUB_STEP_SUMMARY
