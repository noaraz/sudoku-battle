name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # needed to post coverage comments

jobs:
  # ── Detect changed paths ───────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'Dockerfile*'
              - 'docker-compose*'

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest · mypy · ruff · pip-audit)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: pytest (with coverage)
        run: pytest -q --cov=app --cov-fail-under=80 --cov-report=xml:coverage.xml

      - name: Coverage comment
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: Backend Coverage

      - name: mypy
        run: mypy app/

      - name: ruff lint
        run: ruff check app/

      - name: ruff format
        run: ruff format --check app/

      - name: pip-audit
        run: pip install pip-audit && pip-audit

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (vitest · tsc · eslint · npm-audit)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: vitest (with coverage)
        run: npx vitest run --reporter=dot --coverage --coverage.thresholds.lines=80 --coverage.reporter=json-summary

      - name: Coverage comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend

      - name: tsc
        run: npx tsc --noEmit

      - name: eslint
        run: npx eslint src/

      - name: npm audit
        run: npm audit --audit-level=high

  # ── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: Docker build
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false

